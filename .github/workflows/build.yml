name: Build Windows
run-name: >
  ${{ inputs.versions }}
  ${{ fromJSON('{"Pro":"PRO","Home":"HOME","Multi":"MULTI"}')[inputs.edition] }}
  ${{ fromJSON('{"x64":"X64","arm64":"ARM64"}')[inputs.architecture] }}
  ${{ fromJSON('{
    "Arabic (Saudi Arabia)":"AR","Bulgarian (Bulgaria)":"BG","Czech (Czech Republic)":"CS","Danish (Denmark)":"DA","German (Germany)":"DE","Greek (Greece)":"EL",
    "English (United Kingdom)":"EN","English (United States)":"EN","Spanish (Spain)":"ES","Spanish (Mexico)":"ES","Estonian (Estonia)":"ET","Finnish (Finland)":"FI",
    "French (Canada)":"FR","French (France)":"FR","Hebrew (Israel)":"HE","Croatian (Croatia)":"HR","Hungarian (Hungary)":"HU","Italian (Italy)":"IT",
    "Japanese (Japan)":"JA","Korean (Korea)":"KO","Lithuanian (Lithuania)":"LT","Latvian (Latvia)":"LV","Norwegian Bokmål (Norway)":"NB",
    "Dutch (Netherlands)":"NL","Polish (Poland)":"PL","Portuguese (Brazil)":"PT","Portuguese (Portugal)":"PT","Romanian (Romania)":"RO","Russian (Russia)":"RU",
    "Slovak (Slovakia)":"SK","Slovenian (Slovenia)":"SL","Serbian (Latin, Serbia)":"SR","Swedish (Sweden)":"SV","Thai (Thailand)":"TH","Turkish (Turkey)":"TR",
    "Ukrainian (Ukraine)":"UK","Chinese (Simplified, China)":"ZH","Chinese (Traditional, Taiwan)":"ZH"
  }')[inputs.language] }}
  ${{ inputs.esd && 'ESD' || '' }}
  ${{ inputs.drivers && 'DRIVERS' || '' }}
  ${{ inputs.netfx3 && 'NETFX3' || '' }}

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: "Windows architecture to build"
        type: choice
        options: [x64, arm64]
        default: x64
        required: true
      versions:
        description: "Windows version to build"
        type: choice
        options:
          - Windows 10 22H2
          - Windows 11 23H2
          - Windows 11 24H2
          - Windows 11 24H2 BETA
          - Windows 11 25H2
          - Windows 11 25H2 BETA
          - Windows 11 26H1
          - Windows DEV
          - Windows CANARY
        default: Windows 11 25H2
        required: true
      edition:
        description: "Windows edition to build"
        type: choice
        options: [Pro, Home, Multi]
        default: Pro
        required: true
      language:
        description: "Language"
        type: choice
        options:
          - Arabic (Saudi Arabia)
          - Bulgarian (Bulgaria)
          - Czech (Czech Republic)
          - Danish (Denmark)
          - German (Germany)
          - Greek (Greece)
          - English (United Kingdom)
          - English (United States)
          - Spanish (Spain)
          - Spanish (Mexico)
          - Estonian (Estonia)
          - Finnish (Finland)
          - French (Canada)
          - French (France)
          - Hebrew (Israel)
          - Croatian (Croatia)
          - Hungarian (Hungary)
          - Italian (Italy)
          - Japanese (Japan)
          - Korean (Korea)
          - Lithuanian (Lithuania)
          - Latvian (Latvia)
          - Norwegian Bokmål (Norway)
          - Dutch (Netherlands)
          - Polish (Poland)
          - Portuguese (Brazil)
          - Portuguese (Portugal)
          - Romanian (Romania)
          - Russian (Russia)
          - Slovak (Slovakia)
          - Slovenian (Slovenia)
          - Serbian (Latin, Serbia)
          - Swedish (Sweden)
          - Thai (Thailand)
          - Turkish (Turkey)
          - Ukrainian (Ukraine)
          - Chinese (Simplified, China)
          - Chinese (Traditional, Taiwan)
        default: Chinese (Simplified, China)
        required: true
      revision:
        description: "Revision number (optional)"
        type: string
        required: false
      esd:
        description: "Use ESD compression"
        type: boolean
        required: true
        default: false
      netfx3:
        description: "Add .NET Framework 3.5"
        type: boolean
        required: true
        default: false
      drivers:
        description: "Add additional drivers (only for x64)"
        type: boolean
        required: true
        default: false
      upload_gofile:
        description: "Upload to Gofile"
        type: boolean
        required: true
        default: true
      upload_pixeldrain:
        description: "Upload to Pixeldrain"
        type: boolean
        required: true
        default: false
      upload_buzzheavier:
        description: "Upload to Buzzheavier"
        type: boolean
        required: true
        default: true
      upload_quark:
        description: "Upload to Quark"
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ fromJSON('{"x64":"windows-2025","arm64":"windows-11-arm"}')[inputs.architecture] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Map inputs
        id: map
        shell: pwsh
        run: |
          $langMap = @{
            'Arabic (Saudi Arabia)'='ar-sa'
            'Bulgarian (Bulgaria)'='bg-bg'
            'Czech (Czech Republic)'='cs-cz'
            'Danish (Denmark)'='da-dk'
            'German (Germany)'='de-de'
            'Greek (Greece)'='el-gr'
            'English (United Kingdom)'='en-gb'
            'English (United States)'='en-us'
            'Spanish (Spain)'='es-es'
            'Spanish (Mexico)'='es-mx'
            'Estonian (Estonia)'='et-ee'
            'Finnish (Finland)'='fi-fi'
            'French (Canada)'='fr-ca'
            'French (France)'='fr-fr'
            'Hebrew (Israel)'='he-il'
            'Croatian (Croatia)'='hr-hr'
            'Hungarian (Hungary)'='hu-hu'
            'Italian (Italy)'='it-it'
            'Japanese (Japan)'='ja-jp'
            'Korean (Korea)'='ko-kr'
            'Lithuanian (Lithuania)'='lt-lt'
            'Latvian (Latvia)'='lv-lv'
            'Norwegian Bokmål (Norway)'='nb-no'
            'Dutch (Netherlands)'='nl-nl'
            'Polish (Poland)'='pl-pl'
            'Portuguese (Brazil)'='pt-br'
            'Portuguese (Portugal)'='pt-pt'
            'Romanian (Romania)'='ro-ro'
            'Russian (Russia)'='ru-ru'
            'Slovak (Slovakia)'='sk-sk'
            'Slovenian (Slovenia)'='sl-si'
            'Serbian (Latin, Serbia)'='sr-latn-rs'
            'Swedish (Sweden)'='sv-se'
            'Thai (Thailand)'='th-th'
            'Turkish (Turkey)'='tr-tr'
            'Ukrainian (Ukraine)'='uk-ua'
            'Chinese (Simplified, China)'='zh-cn'
            'Chinese (Traditional, Taiwan)'='zh-tw'
          }

          $verMap = @{
            'Windows 10 22H2'      = 'windows-10'
            'Windows 11 23H2'      = 'windows-11old'
            'Windows 11 24H2'      = 'windows-11'
            'Windows 11 24H2 BETA' = 'windows-11beta'
            'Windows 11 25H2'      = 'windows-11new'
            'Windows 11 25H2 BETA' = 'windows-11dev'
            'Windows 11 26H1'      = 'windows-1126h1'
            'Windows DEV'          = 'windows-dev'
            'Windows CANARY'       = 'windows-canary'
          }

          $langCode = $langMap['${{ inputs.language }}']
          $verCode  = $verMap['${{ inputs.versions }}']

          $opts = ''
          if ('${{ inputs.esd }}' -eq 'true')     { $opts += ' -esd' }
          if (('${{ inputs.drivers }}' -eq 'true') -and ('${{ inputs.architecture }}' -ne 'arm64')) {
            $opts += ' -drivers'
          }
          if ('${{ inputs.netfx3 }}' -eq 'true')  { $opts += ' -netfx3' }
          if (-not [string]::IsNullOrWhiteSpace('${{ inputs.revision }}')) {
            $opts += ' -revision "${{ inputs.revision }}"'
          }
          $opts = $opts.Trim()

          echo "lang=$langCode"    >> $env:GITHUB_OUTPUT
          echo "version=$verCode"  >> $env:GITHUB_OUTPUT
          if ($opts) {
            echo "options=$opts"   >> $env:GITHUB_OUTPUT
          }

      - name: Build Windows
        id: build_windows
        shell: pwsh
        run: |
          pwsh uup-dump-get-windows-iso.ps1 ${{ steps.map.outputs.version }} ${{ inputs.architecture == 'arm64' && 'c:/output' || 'd:/output' }} -architecture ${{ inputs.architecture }} -edition ${{ inputs.edition }} -lang ${{ steps.map.outputs.lang }} ${{ steps.map.outputs.options }}
          echo "iso_name=$env:ISO_NAME" >> $env:GITHUB_OUTPUT

      - name: Upload to Gofile
        id: upload_gofile
        if: ${{ inputs.upload_gofile == true }}
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          $outputDir = "${{ inputs.architecture == 'arm64' && 'C:/output' || 'D:/output' }}"
          $isoFile = Get-Item "$outputDir/*.ISO" | Select-Object -First 1
          if (-not $isoFile) {
            Write-Warning "Gofile: ISO file not found."
            echo "GOFILE_LINK=" >> $env:GITHUB_ENV
            return
          }

          try {
            $uri = "https://upload.gofile.io/contents/uploadfile"
            $r = Invoke-RestMethod -Uri $uri -Method Post -Form @{ file = $isoFile } -ErrorAction Stop
            if ($r.status -ne 'ok') { throw "status=$($r.status)" }
            echo "GOFILE_LINK=$($r.data.downloadPage)" >> $env:GITHUB_ENV
            Write-Host "Gofile uploaded: $($r.data.downloadPage)"
          } catch {
            Write-Warning "Gofile upload failed: $_"
            echo "GOFILE_LINK=" >> $env:GITHUB_ENV
          }

      - name: Upload to Pixeldrain
        id: upload_pixeldrain
        if: ${{ inputs.upload_pixeldrain == true }}
        shell: pwsh
        continue-on-error: true
        env:
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          $ErrorActionPreference = 'Continue'
          $outputDir = "${{ inputs.architecture == 'arm64' && 'C:/output' || 'D:/output' }}"
          $isoFile = Get-Item "$outputDir/*.ISO" | Select-Object -First 1
          if (-not $isoFile) {
            Write-Warning "Pixeldrain: ISO file not found."
            echo "PIXELDRAIN_LINK=" >> $env:GITHUB_ENV
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:PIXELDRAIN_API_KEY)) {
            Write-Warning "Pixeldrain API key is empty."
            echo "PIXELDRAIN_LINK=" >> $env:GITHUB_ENV
            exit 0
          }

          try {
            $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$env:PIXELDRAIN_API_KEY"))
            $headers = @{ Authorization = "Basic $base64" }
            $uri = "https://pixeldrain.com/api/file/$([Uri]::EscapeDataString($isoFile.Name))"
            $r = Invoke-RestMethod -Uri $uri -Method Put `
                  -Headers $headers `
                  -InFile $isoFile.FullName `
                  -ContentType 'application/octet-stream' `
                  -ErrorAction Stop
            if (-not $r.id) { throw "no id in response: $($r | ConvertTo-Json -Compress)" }
            $url = "https://pixeldrain.com/u/$($r.id)"
            echo "PIXELDRAIN_LINK=$url" >> $env:GITHUB_ENV
            Write-Host "Pixeldrain uploaded: $url"
          } catch {
            Write-Warning "Pixeldrain upload failed: $_"
            echo "PIXELDRAIN_LINK=" >> $env:GITHUB_ENV
          }

      - name: Upload to Buzzheavier
        id: upload_buzzheavier
        if: ${{ inputs.upload_buzzheavier == true }}
        shell: pwsh
        continue-on-error: true
        env:
          BUZZHEAVIER_API_KEY: ${{ secrets.BUZZHEAVIER_API_KEY }}
          BUZZHEAVIER_FOLDER_ID: ${{ secrets.BUZZHEAVIER_FOLDER_ID }}
          BUZZHEAVIER_LOCATION_ID: "12brteedoy0f"
        run: |
          $ErrorActionPreference = 'Continue'
          $outputDir = "${{ inputs.architecture == 'arm64' && 'C:/output' || 'D:/output' }}"
          $isoFile = Get-Item "$outputDir/*.ISO" | Select-Object -First 1
          if (-not $isoFile) {
            Write-Warning "Buzzheavier: ISO file not found."
            echo "BUZZHEAVIER_LINK=" >> $env:GITHUB_ENV
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:BUZZHEAVIER_API_KEY)) {
            Write-Warning "Buzzheavier API key is empty."
            echo "BUZZHEAVIER_LINK=" >> $env:GITHUB_ENV
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:BUZZHEAVIER_FOLDER_ID)) {
            Write-Warning "Buzzheavier folder id is empty."
            echo "BUZZHEAVIER_LINK=" >> $env:GITHUB_ENV
            exit 0
          }

          try {
            $uri = "https://w.buzzheavier.com/$($env:BUZZHEAVIER_FOLDER_ID)/$([Uri]::EscapeDataString($isoFile.Name))?locationId=$($env:BUZZHEAVIER_LOCATION_ID)"
            $headers = @{ Authorization = "Bearer $env:BUZZHEAVIER_API_KEY" }

            $r = Invoke-RestMethod -Uri $uri -Method Put `
                  -Headers $headers `
                  -InFile $isoFile.FullName `
                  -ContentType 'application/octet-stream' `
                  -ErrorAction Stop

            $fileId = $null
            if ($r.id) {
              $fileId = $r.id
            } elseif ($r.data -and $r.data.id) {
              $fileId = $r.data.id
            }

            if (-not $fileId) {
              throw "no id in response: $($r | ConvertTo-Json -Compress)"
            }

            $url = "https://buzzheavier.com/$fileId"
            echo "BUZZHEAVIER_LINK=$url" >> $env:GITHUB_ENV
            Write-Host "Buzzheavier uploaded: $url"
          } catch {
            Write-Warning "Buzzheavier upload failed: $_"
            echo "BUZZHEAVIER_LINK=" >> $env:GITHUB_ENV
          }

      - name: Setup Quark CLI
        if: ${{ inputs.upload_quark == true }}
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          $url = "https://github.com/zhangjingwei/kuake_cli/releases/download/v1.5.0/kuake-v1.5.0-windows-amd64.exe"
          $dest = "$env:RUNNER_TEMP\\kuake.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          echo "$env:RUNNER_TEMP" >> $env:GITHUB_PATH
          Write-Host "Quark CLI downloaded to $dest"

      - name: Upload to Quark
        id: upload_quark
        if: ${{ inputs.upload_quark == true }}
        shell: pwsh
        continue-on-error: true
        env:
          KUAKE_COOKIE: ${{ secrets.KUAKE_COOKIE }}
          KUAKE_PUS: ${{ secrets.KUAKE_PUS }}
          KUAKE_PUUS: ${{ secrets.KUAKE_PUUS }}
          KUAKE_UPLOAD_PARALLEL: "16"
        run: |
          $ErrorActionPreference = 'Continue'
          $outputDir = "${{ inputs.architecture == 'arm64' && 'C:/output' || 'D:/output' }}"
          $isoFile = Get-Item "$outputDir/*.ISO" | Select-Object -First 1
          if (-not $isoFile) {
            Write-Warning "Quark: ISO file not found."
            echo "QUARK_LINK=" >> $env:GITHUB_ENV
            exit 0
          }
          $hasCookie = -not [string]::IsNullOrWhiteSpace($env:KUAKE_COOKIE)
          $hasSplit = (-not [string]::IsNullOrWhiteSpace($env:KUAKE_PUS)) -and (-not [string]::IsNullOrWhiteSpace($env:KUAKE_PUUS))
          if (-not $hasCookie -and -not $hasSplit) {
            Write-Warning "Quark credentials are empty."
            echo "QUARK_LINK=" >> $env:GITHUB_ENV
            exit 0
          }

          try {
            $kuake = "$env:RUNNER_TEMP\\kuake.exe"
            if (-not (Test-Path $kuake)) {
              throw "kuake.exe not found"
            }

            $remotePath = "/uupiso/$($isoFile.Name)"
            $uploadJson = & $kuake upload "$($isoFile.FullName)" "$remotePath" --max_upload_parallel 16
            if ($LASTEXITCODE -ne 0) {
              throw "kuake upload failed: $uploadJson"
            }

            $shareJson = & $kuake share "$remotePath" 7 "false"
            if ($LASTEXITCODE -ne 0) {
              throw "kuake share failed: $shareJson"
            }

            $share = $shareJson | ConvertFrom-Json
            $shareLink = $null
            if ($share.success -and $share.data) {
              if ($share.data.share_link) { $shareLink = $share.data.share_link }
              elseif ($share.data.url) { $shareLink = $share.data.url }
              elseif ($share.data.link) { $shareLink = $share.data.link }
            }

            if (-not $shareLink) {
              throw "Quark share link not found: $shareJson"
            }

            echo "QUARK_LINK=$shareLink" >> $env:GITHUB_ENV
            Write-Host "Quark uploaded: $shareLink"
          } catch {
            Write-Warning "Quark upload failed: $_"
            echo "QUARK_LINK=" >> $env:GITHUB_ENV
          }

      - name: Build summary
        id: build_summary
        shell: pwsh
        run: |
          $outputDir = "${{ inputs.architecture == 'arm64' && 'C:/output' || 'D:/output' }}"
          $jsonPath = Get-ChildItem -Path $outputDir -Filter "*.iso.json" | Select-Object -First 1
          if (-not $jsonPath) {
            $jsonPath = Get-ChildItem -Path $outputDir -Filter "*.json" | Select-Object -First 1
          }
          if (-not $jsonPath) {
            Write-Error "ISO metadata JSON file not found."
            exit 1
          }

          $iso = Get-Content $jsonPath.FullName | ConvertFrom-Json
          $imageNames = $iso.images | ForEach-Object { $_.name }
          if ($imageNames.Count -gt 1) {
            if ($imageNames[0] -match '^(Windows (10|11))\s*(.*)') {
              $prefix = $matches[1]
              $first = $imageNames[0]
              $rest = $imageNames[1..($imageNames.Count - 1)] | ForEach-Object { ($_ -replace "^$prefix\s*", '') }
              $finalImageName = $first + '/' + ($rest -join '/')
            } else {
              $finalImageName = $imageNames -join '/'
            }
          } else {
            $finalImageName = $imageNames
          }

          $opts = '${{ steps.map.outputs.options }}'
          $optsRow = $null
          if (-not [string]::IsNullOrWhiteSpace($opts)) {
            $descMap = @{
              '-esd'     = 'Use ESD compression'
              '-drivers' = 'Add additional drivers'
              '-netfx3'  = 'Add .NET Framework 3.5'
            }
            $items = $opts -split '\s+' |
              Where-Object { $_ -and $_.Trim() -ne '' } |
              ForEach-Object {
                $k = $_.ToLower()
                if ($descMap.ContainsKey($k)) { $descMap[$k] } else { $_.TrimStart('-') }
              } | Select-Object -Unique

            if ($items.Count -gt 0) {
              $optsFormatted = ($items | ForEach-Object { "<li>$($_)</li>" }) -join ''
              $optsRow = "| Build config | <ul>$optsFormatted</ul> |"
            }
          }

          $isoFile = Get-Item "$outputDir/*.ISO" | Select-Object -First 1
          $isoName = if ($isoFile) { $isoFile.Name } else { $env:ISO_NAME + '.ISO' }
          $isoSize = if ($isoFile) { [math]::Round($isoFile.Length / 1GB, 2).ToString() + ' GB (' + $isoFile.Length + ' bytes)' } else { 'Unknown' }

          Add-Content $env:GITHUB_STEP_SUMMARY @"
          ### FILE INFO:
          | Property | Value |
          | :--- | :--- |
          | Name | $finalImageName $($iso.version) |
          | Build | $($iso.build) |
          | Architecture | ${{ inputs.architecture }} |
          | Language | ${{ inputs.language }} |
          | ISO file | $isoName |
          | ISO size | $isoSize |
          "@

          if ($optsRow) {
            Add-Content $env:GITHUB_STEP_SUMMARY $optsRow
          }

          Add-Content $env:GITHUB_STEP_SUMMARY @"
          | Checksum | $($iso.checksum) |
          | UUP dump | [$($iso.title)]($($iso.uupDump.downloadUrl)) |
          "@

          $cloudMd = "`n### CLOUD DOWNLOAD LINKS:`n| Mirror | Link |`n| :--- | :--- |`n"
          $hasCloud = $false
          if ($env:GOFILE_LINK) {
            $cloudMd += "| Gofile | $($env:GOFILE_LINK) |`n"
            $hasCloud = $true
          }
          if ($env:PIXELDRAIN_LINK) {
            $cloudMd += "| Pixeldrain | $($env:PIXELDRAIN_LINK) |`n"
            $hasCloud = $true
          }
          if ($env:BUZZHEAVIER_LINK) {
            $cloudMd += "| Buzzheavier | $($env:BUZZHEAVIER_LINK) |`n"
            $hasCloud = $true
          }
          if ($env:QUARK_LINK) {
            $cloudMd += "| Quark | $($env:QUARK_LINK) |`n"
            $hasCloud = $true
          }
          if (-not $hasCloud) {
            $cloudMd += "| None | Upload failed or disabled |`n"
          }
          Add-Content $env:GITHUB_STEP_SUMMARY $cloudMd

          $rlsnfo = @"

          ## RELEASE INFO
          > [!NOTE]
          > ISO file is uploaded to enabled cloud drives only.
          > GitHub Release stores the metadata and cloud download links.

          > [!TIP]
          > If one mirror is unavailable, use another mirror listed above.
          "@

          ((Get-Content $env:GITHUB_STEP_SUMMARY) + "<br/>" + $rlsnfo) | Set-Content summary.md
          echo "build=$($iso.build)" >> $env:GITHUB_ENV
          echo "version=$($iso.version)" >> $env:GITHUB_ENV
          echo "name=$($iso.name)" >> $env:GITHUB_ENV
          echo "title=$($iso.title)" >> $env:GITHUB_ENV
          echo "images=$($finalImageName)" >> $env:GITHUB_ENV
          echo "iso_checksum=$($iso.checksum)" >> $env:GITHUB_ENV
          echo "tagname=$($iso.build).$($iso.version).${{ fromJSON('{"Pro":"PRO","Home":"HOME","Multi":"MULTI"}')[inputs.edition] }}.${{ fromJSON('{"x64":"X64","arm64":"ARM64"}')[inputs.architecture] }}.${{ fromJSON('{"ar-sa":"AR","bg-bg":"BG","cs-cz":"CS","da-dk":"DA","de-de":"DE","el-gr":"EL","en-gb":"EN","en-us":"EN","es-es":"ES","es-mx":"ES","et-ee":"ET","fi-fi":"FI","fr-ca":"FR","fr-fr":"FR","he-il":"HE","hr-hr":"HR","hu-hu":"HU","it-it":"IT","ja-jp":"JA","ko-kr":"KO","lt-lt":"LT","lv-lv":"LV","nb-no":"NB","nl-nl":"NL","pl-pl":"PL","pt-br":"PT","pt-pt":"PT","ro-ro":"RO","ru-ru":"RU","sk-sk":"SK","sl-si":"SL","sr-latn-rs":"SR","sv-se":"SV","th-th":"TH","tr-tr":"TR","uk-ua":"UK","zh-cn":"ZH","zh-tw":"ZH"}')[steps.map.outputs.lang] }}$($iso.tags)" >> $env:GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ env.tagname }}"
          name: "${{ env.images }} ${{ inputs.architecture }} ${{ env.version }} (${{ env.build }})"
          body_path: summary.md
          draft: false
          prerelease: ${{ !contains(fromJson('["Windows 10 22H2","Windows 11 23H2","Windows 11 24H2","Windows 11 25H2","Windows 11 26H1"]'), inputs.versions) }}
